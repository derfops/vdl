services:
  vpn-vdl:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=cyberghost
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=Netherlands
      - OPENVPN_CLIENTCRT_FILE=/gluetun/client.crt
      - OPENVPN_CLIENTKEY_FILE=/gluetun/client.key
      - OPENVPN_CACRT_FILE=/gluetun/ca.crt
      - DNS_SERVER=on
      - DNS_ADDRESS=1.1.1.1
      - OPENVPN_ENDPOINT_PORT=443
      - OPENVPN_PROTOCOL=tcp
      - OPENVPN_MSSFIX=1300
    volumes:
      - ./gluetun:/gluetun
    restart: unless-stopped

  vdl:
    build:
      context: .
    image: vdl-ubuntu:latest
    container_name: vdl
    depends_on:
      - vpn-vdl
    environment:
      - TZ=America/Sao_Paulo
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VDL_TOKEN=${VDL_TOKEN}
    volumes:
      - ./data:/data
      - /data/storage/media:/data/storage/media
      - ./logs:/logs
      - ./docs/HOWTO.md:/opt/vdl/HOWTO.md:ro
      - whisper_cache:/cache/whisper
    working_dir: /data
    network_mode: "service:vpn-vdl"
    command: bash -lc "python3 /opt/vdl/checkup.py; [ -f /data/vdl_token.env ] && source /data/vdl_token.env; cat /opt/vdl/HOWTO.md; tail -f /dev/null"

volumes:
  whisper_cache:
