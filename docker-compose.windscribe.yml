name: vdl-windscribe

services:
  vpn-windscribe:
    image: qmcgaw/gluetun:latest
    container_name: gluetun-windscribe
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=America/Sao_Paulo
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - FIREWALL=on
    volumes:
      - ./windscribe/wg0.conf:/gluetun/wireguard/wg0.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "/gluetun-entrypoint healthcheck"]
      interval: 5s
      timeout: 5s
      start_period: 45s
      retries: 12
    restart: unless-stopped

  vdl-windscribe:
    build:
      context: .
    image: vdl-ubuntu:latest
    container_name: vdl-windscribe
    depends_on:
      vpn-windscribe:
        condition: service_healthy
    network_mode: "service:vpn-windscribe"
    environment:
      - TZ=America/Sao_Paulo
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VDL_TOKEN=${VDL_TOKEN}
    volumes:
      - ./data:/data
      - ${MEDIA_DIR:-./data/storage/media}:/data/storage/media
      - ./logs:/logs
      - ./docs/HOWTO.md:/opt/vdl/HOWTO.md:ro
      - whisper_cache_windscribe:/cache/whisper
    working_dir: /data
    command: bash -lc "python3 /opt/vdl/checkup.py; [ -f /data/vdl_token.env ] && source /data/vdl_token.env; cat /opt/vdl/HOWTO.md; tail -f /dev/null"
    restart: unless-stopped

volumes:
  whisper_cache_windscribe:
